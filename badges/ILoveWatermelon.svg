<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="156" height="20" viewBox="0 0 156 20" role="img" aria-labelledby="title desc">
  <title id="title">#ILoveWatermelon</title>
  <desc id="desc">A compact badge with #ILoveWatermelon text and a pixel-art square watermelon icon.</desc>

  <defs>
    <clipPath id="badge-clip">
      <rect width="156" height="20" rx="3.5"/>
    </clipPath>
    <clipPath id="label-clip">
      <rect x="0" y="0" width="136" height="20"/>
    </clipPath>
    <linearGradient id="label-shadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".10"/>
      <stop offset="1" stop-color="#000000" stop-opacity=".10"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#badge-clip)">
    <rect width="136" height="20" fill="#4B5563"/>
    <rect width="136" height="20" fill="url(#label-shadow)"/>

    <text clip-path="url(#label-clip)" x="8" y="14" fill="#FFFFFF" font-family="Verdana, Geneva, DejaVu Sans, Arial, sans-serif" font-size="11" font-weight="700">#ILoveWatermelon</text>

    <g shape-rendering="crispEdges">
      <rect x="136" y="0" width="20" height="20" fill="#0B0F0D"/>
      <rect x="137" y="1" width="18" height="18" fill="#006B2D"/>
      <rect x="139" y="1" width="3" height="18" fill="#009639"/>
      <rect x="146" y="1" width="3" height="18" fill="#009639"/>
      <rect x="137" y="4" width="18" height="3" fill="#00A84A"/>
      <rect x="137" y="13" width="18" height="3" fill="#005A25"/>
      <rect x="140" y="4" width="12" height="12" fill="#FFFFFF"/>
      <rect x="142" y="6" width="8" height="8" fill="#ED2E38"/>
      <rect x="144" y="8" width="2" height="2" fill="#111111"/>
      <rect x="148" y="10" width="2" height="2" fill="#111111"/>
    </g>
  </g>

  <rect x="0.3" y="0.3" width="155.4" height="19.4" rx="3.2" fill="none" stroke="#000000" stroke-width="0.6" opacity=".55"/>
</svg>
